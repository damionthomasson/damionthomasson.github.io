<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMION // 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Changed from pure black to a deep midnight gray so gradients actually show up */
            --bg: #0a0a0c; 
            --text: #ffffff;
            --accent: #d1ff00; 
            --sub: #999999;
            --grid: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- THE "NOT DOGSHITE" BACKGROUND --- */
        .visual-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: var(--bg);
            overflow: hidden;
        }

        /* Bright Glows - Increased Opacity so you can see them */
        .blob {
            position: absolute;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(209, 255, 0, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            top: 40%; right: -10%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes move {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(20%, 20%); }
        }

        /* The Grid - Sharp and Visible */
        .grid-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 60px 60px;
            /* Subtle fade out at bottom */
            mask-image: linear-gradient(to bottom, black 70%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent);
        }

        /* Static/Noise overlay for that "Premium" feel */
        .noise-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.2;
            pointer-events: none;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            filter: contrast(150%) brightness(1000%);
        }

        /* --- CONTENT STYLES --- */
        nav {
            position: fixed;
            top: 30px; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 30px;
            border-radius: 100px;
            backdrop-filter: blur(10px);
            display: flex; gap: 30px;
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        nav a:hover { color: var(--accent); }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; padding: 0 10%;
        }

        .mono { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 0.8rem; margin-bottom: 20px; letter-spacing: 2px; }

        h1 {
            font-size: clamp(4rem, 15vw, 10rem);
            line-height: 0.8; font-weight: 900;
            margin-bottom: 30px; text-transform: uppercase;
        }

        .outline { color: transparent; -webkit-text-stroke: 1.5px rgba(255,255,255,0.4); }

        .hero p {
            font-size: 1.4rem; color: var(--sub); max-width: 600px; line-height: 1.4;
            border-left: 4px solid var(--accent); padding-left: 30px;
        }

        /* Projects */
        .projects { padding: 100px 10%; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; transition: 0.4s; }
        .card:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); transform: translateY(-10px); }
        h2 { font-size: 2.5rem; margin-bottom: 10px; }

        @media (max-width: 900px) {
            .projects { grid-template-columns: 1fr; }
            h1 { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <div class="visual-layer">
        <div class="blob"></div>
        <div class="blob-2"></div>
        <div class="grid-lines"></div>
        <div class="noise-overlay"></div>
    </div>

    <nav>
        <a href="#work">Work</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <section class="hero">
        <div class="mono">// 2026_EST_CORE</div>
        <h1>DAMION<br><span class="outline">THOMASSON</span></h1>
        <p>Full-stack developer architecting high-performance digital landscapes. Clean code. Aggressive design.</p>
    </section>

    <section class="projects" id="work">
        <div class="card">
            <div class="mono">01. DEVELOPMENT</div>
            <h2>TITAN CORE</h2>
            <p>Modern architecture for the next web.</p>
        </div>
        <div class="card">
            <div class="mono">02. DESIGN</div>
            <h2>VOID UI</h2>
            <p>Dark-themed design systems.</p>
        </div>
    </section>

</body>
</html>
