<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMION // 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #d1ff00; 
            --sub: #aaaaaa;
            --grid-color: rgba(209, 255, 0, 0.15); /* Brightened the grid */
            --glow-color: rgba(209, 255, 0, 0.2);  /* Brightened the glow */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- THE HIGH-CONTRAST BACKGROUND --- */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: #080808;
        }

        /* Visible Moving Aurora */
        .aurora {
            position: absolute;
            top: -20%; left: -10%;
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 60%);
            filter: blur(60px);
            animation: drift 15s infinite alternate;
        }

        .aurora-2 {
            position: absolute;
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 60%);
            filter: blur(60px);
            animation: drift 20s infinite alternate-reverse;
        }

        /* Visible Noise Texture */
        .noise {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        /* Very Visible Grid */
        .grid {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at 50% 50%, white, transparent 85%);
            -webkit-mask-image: radial-gradient(circle at 50% 50%, white, transparent 85%);
            opacity: 0.6; /* Pushed opacity way up */
        }

        @keyframes drift {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(10%, 10%) rotate(10deg); }
        }

        /* --- UI ELEMENTS --- */
        nav {
            position: fixed;
            top: 30px; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid var(--grid-color);
            padding: 10px 25px;
            border-radius: 100px;
            display: flex; gap: 30px;
        }
        nav a { color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; padding: 0 10%;
        }

        h1 {
            font-size: clamp(3rem, 12vw, 9rem);
            line-height: 0.8; font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .outline { color: transparent; -webkit-text-stroke: 1.5px rgba(255,255,255,0.4); }

        .hero p {
            font-size: 1.3rem; color: var(--sub); max-width: 550px;
            border-left: 4px solid var(--accent); padding-left: 20px;
        }

        .btn {
            margin-top: 40px;
            display: inline-block; padding: 15px 40px;
            background: var(--accent); color: #000;
            text-decoration: none; font-weight: 900;
            text-transform: uppercase; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="aurora"></div>
        <div class="aurora-2"></div>
        <div class="grid"></div>
        <div class="noise"></div>
    </div>

    <nav>
        <a href="#work">Work</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <section class="hero">
        <div style="font-family: 'JetBrains Mono'; color: var(--accent); margin-bottom: 10px;">// SYSTEM_READY</div>
        <h1>DAMION<br><span class="outline">THOMASSON</span></h1>
        <p>Full-stack developer building high-fidelity digital experiences. Code that performs, design that hits.</p>
        <div><a href="#work" class="btn">View My Work</a></div>
    </section>

</body>
</html>
