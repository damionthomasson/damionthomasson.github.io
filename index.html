<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMION | 2026</title>
    <style>
        :root {
            --bg: #030303;
            --card: rgba(20, 20, 20, 0.7);
            --accent: #d1ff00; /* Neon Lime */
            --text: #ffffff;
            --dim: #777;
            --border: rgba(255, 255, 255, 0.06);
            --glow: rgba(209, 255, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Subtle Background Grain */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #030303 100%);
            z-index: -1;
        }

        .bento {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto;
            gap: 16px;
            max-width: 1100px;
            width: 95%;
            padding: 40px 0;
        }

        .box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 35px;
            border-radius: 32px;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .box:hover {
            border-color: var(--accent);
            background: rgba(30, 30, 30, 0.5);
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px var(--glow);
        }

        /* Bento Geometry */
        .hero { grid-column: span 3; grid-row: span 2; min-height: 380px; justify-content: center; }
        .projects { grid-column: span 1; grid-row: span 2; background: linear-gradient(135deg, #111 0%, #000 100%); }
        .stack { grid-column: span 2; }
        .contact { grid-column: span 2; border: 1px solid var(--accent); }

        /* Typography */
        h1 { 
            font-size: clamp(2.5rem, 6vw, 4.5rem); 
            font-weight: 800; 
            letter-spacing: -3px; 
            line-height: 0.9;
            margin-bottom: 20px;
        }

        h2 { font-size: 1.5rem; margin-bottom: 10px; font-weight: 700; letter-spacing: -1px; }

        .accent { color: var(--accent); }
        
        p { color: var(--dim); font-size: 1.1rem; max-width: 450px; }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(209, 255, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(209, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(209, 255, 0, 0); }
        }

        /* Mobile Layout */
        @media (max-width: 850px) {
            .bento { grid-template-columns: 1fr; padding: 20px; }
            .hero, .projects, .stack, .contact { grid-column: span 1; grid-row: auto; min-height: auto; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="bento">
        <div class="box hero">
            <div class="status">
                <span class="status-dot"></span> Available for Hire
            </div>
            <h1>I Build <span class="accent">Epic</span> Shit<span class="accent">.</span></h1>
            <p>Full-stack developer architecting the digital future with clean code and aggressive design.</p>
        </div>

        <div class="box projects">
            <h2 class="accent">Work</h2>
            <p>Recent drops & open source contributions.</p>
            <br>
            <a href="#" style="color:white; text-decoration: none; font-weight: bold;">View GitHub ↗</a>
        </div>

        <div class="box stack">
            <h2>Arsenal</h2>
            <p>React, Next.js, PHP 8.4, Tailwind, & Motion Design.</p>
        </div>

        <div class="box contact">
            <h2 class="accent">Let's Talk</h2>
            <p>damion@yourdomain.com</p>
        </div>
    </div>

</body>
</html>
