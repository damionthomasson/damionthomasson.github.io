<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMION // 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #d1ff00; 
            --sub: #888888;
            --border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- THE BACKGROUND (CRANKED UP INTENSITY) --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        /* Moving Glow 1 */
        .glow-1 {
            position: absolute;
            top: -10%; left: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(209, 255, 0, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        /* Moving Glow 2 */
        .glow-2 {
            position: absolute;
            bottom: -10%; right: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            animation: move 25s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(20%, 20%); }
        }

        /* High-Visibility Grid */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 95%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 95%);
            opacity: 0.3;
        }

        /* --- UI ELEMENTS --- */
        nav {
            position: fixed;
            top: 30px; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 12px 30px;
            border-radius: 100px;
            display: flex; gap: 40px;
        }
        nav a {
            color: var(--sub); text-decoration: none; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 2px; font-weight: 700; transition: 0.3s;
        }
        nav a:hover { color: var(--accent); }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; padding: 0 10%;
            position: relative;
        }

        .mono { 
            font-family: 'JetBrains Mono', monospace; color: var(--accent); 
            font-size: 0.8rem; margin-bottom: 25px; display: flex; align-items: center; gap: 15px;
        }
        
        .mono::before { content: ""; width: 30px; height: 1px; background: var(--accent); }

        h1 {
            font-size: clamp(3rem, 15vw, 9rem);
            line-height: 0.8; letter-spacing: -0.06em; font-weight: 900;
            margin-bottom: 40px; text-transform: uppercase;
        }

        .outline { color: transparent; -webkit-text-stroke: 1.5px rgba(255,255,255,0.3); }

        .hero p {
            font-size: 1.2rem; color: var(--sub); max-width: 500px; line-height: 1.6;
            border-left: 3px solid var(--accent); padding-left: 25px;
        }

        .section-label { 
            padding: 150px 10% 40px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 100px;
        }

        .project-card {
            display: grid; grid-template-columns: 1fr 1fr; gap: 100px;
            padding: 0 10%; margin-bottom: 200px; align-items: center;
        }

        .project-img {
            background: rgba(255,255,255,0.03); aspect-ratio: 16/10;
            border-radius: 24px; border: 1px solid var(--border);
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-card:hover .project-img { border-color: var(--accent); transform: translateY(-10px); }

        h2 { font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; letter-spacing: -2px; }

        .btn {
            display: inline-block; padding: 15px 35px; border: 1px solid #fff;
            color: #fff; text-decoration: none; font-weight: bold; margin-top: 30px;
            text-transform: uppercase; font-size: 0.8rem; transition: 0.3s;
        }
        .btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        @media (max-width: 900px) {
            .project-card { grid-template-columns: 1fr; gap: 40px; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav>
        <a href="#work">Work</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <section class="hero">
        <div class="mono">STATUS: ACTIVE // PORTFOLIO 2026</div>
        <h1>DAMION<br><span class="outline">THOMASSON</span></h1>
        <p>Full-stack developer building high-fidelity digital experiences. Architecting code that performs as well as it looks.</p>
    </section>

    <div class="section-label" id="work">
        <span class="mono">PROJECTS</span>
        <span class="mono">01 - 02</span>
    </div>

    <section class="project-card">
        <div class="project-img"></div>
        <div class="project-info">
            <h2>TITAN CORE</h2>
            <p style="color: var(--sub); margin-top: 20px;">A performance-first design system for the modern web.</p>
            <a href="#" class="btn">View Details</a>
        </div>
    </section>

</body>
</html>
