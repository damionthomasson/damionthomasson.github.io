<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | 2026</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111;
            --accent: #d1ff00;
            --text: #fff;
            --dim: #888;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .bento {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 50px auto;
        }
        .box {
            background: var(--card);
            border: 1px solid #222;
            padding: 30px;
            border-radius: 24px;
            transition: 0.3s;
        }
        .box:hover { border-color: var(--accent); transform: scale(1.02); }
        .hero { grid-column: span 2; }
        h1 { font-size: 3rem; margin: 0; }
        .accent { color: var(--accent); }
        p { color: var(--dim); }
    </style>
</head>
<body>
    <div class="bento">
        <div class="box hero">
            <h1>I Build <span class="accent">Epic</span> Shit.</h1>
            <p>Full-stack developer focused on 2026 web standards.</p>
        </div>
        <div class="box">
            <h2 class="accent">Projects</h2>
            <p>Check my GitHub for the latest drops.</p>
        </div>
        <div class="box">
            <h2 class="accent">Contact</h2>
            <p>Available for hire.</p>
        </div>
    </div>
</body>
</html>
